        .font-hangyaboly {
            font-family: 'Hangyaboly', sans-serif;
        }

        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        .video-container::-webkit-scrollbar {
            display: none;
        }
        .video-container {
            -ms-overflow-style: none;
            scrollbar-width: none;
            scroll-snap-type: y mandatory;
        }
        .video-card {
            scroll-snap-align: start;
            height: calc(100vh - 140px);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [scrolled, setScrolled] = useState(false);
            const [activePage, setActivePage] = useState('home');

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                if (window.lucide) window.lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const domains = [
                { title: "Tehnologie", icon: "cpu", color: "bg-blue-500", desc: "Software, AI, Robotică și viitorul digital." },
                { title: "Arte & Design", icon: "palette", color: "bg-purple-500", desc: "Creativitate vizuală, arhitectură și modă." },
